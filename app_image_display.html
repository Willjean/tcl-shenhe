        .sidebar {

        }
        .sidebar-title {
            font-size: 16px;

            margin-bottom: 20px;
            color: #333;
        }
        .nav-item {

            padding: 10px;

            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            color: #333;
            text-decoration: none;
            font-size: 14px;
        }
        .nav-item:hover {

        }
        .nav-item.active {
            background-color: #e3f2fd;
            color: #007bff;

        }
        .main-content {

            display: flex;
            flex-direction: column;

            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .header {
            background-color: #ffffff;
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-button {
            font-size: 20px;
            margin-right: 15px;
            cursor: pointer;
        }

        .header-title {
            font-size: 16px;
            font-weight: bold;
        }

        .tab-bar {
            background-color: #ffffff;
            padding: 15px;
            display: flex;
            border-bottom: 1px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            font-size: 14px;
            color: #666;
            border-bottom: 2px solid transparent;
            cursor: pointer;
        }

        .tab.active {
            color: #ff0000;
            border-bottom-color: #ff0000;
        }

        .section {
            background-color: #ffffff;
            margin: 10px 0;
            padding: 15px;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .image-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-container {
            width: 100%;
            aspect-ratio: 1;
            background-color: #f5f5f5;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .image-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            text-align: center;
        }

        .bottom-bar {
            background-color: #ffffff;
            padding: 15px;
            position: sticky;
            bottom: 0;
            border-top: 1px solid #e0e0e0;
        }

        .save-button {
            width: 100%;
            padding: 12px;
            background-color: #ff0000;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .reject-button {
            background-color: #ffffff;
            color: #ff0000;
            border: 1px solid #ff0000;
            margin-bottom: 10px;
        }

        .new-image {
            border: 2px dashed #007bff;
            background-color: #f0f8ff;
        }

        .image-label.new {
            color: #007bff;
            font-weight: bold;
            cursor: pointer;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 600px;
            border-radius: 4px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .modal-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }

        .modal-body {
            font-size: 14px;
            line-height: 1.5;
        }

    <script>
        // 模拟标签切换功能
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 模拟返回按钮功能
        document.querySelector('.back-button').addEventListener('click', function() {
            alert('返回');
        });

        // 模拟保存按钮功能
        document.querySelector('.save-button').addEventListener('click', function() {
            alert('保存成功');
        });

        // Get the modal
        var modal = document.getElementById('prdModal');
        var modalBody = document.getElementById('modalBody');
        var closeBtn = document.getElementsByClassName('close')[0];

        // Close modal when close button is clicked
        closeBtn.onclick = function() {
            modal.style.display = "none";
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // Function to show PRD description
        function showPRDDescription(featureId) {
            var descriptions = {
                '1': '1. 新增影像件类型：最低立柱高度测量值特写照片\n2. 放置位置：《组件南侧距屋面高度照片【阵列式】》之后\n3. 标记序号：1\n4. 允许上传png、jpg、pdf格式文件\n5. 最大支持上传20MB\n6. 在满足适用房型+二级分类+电站安装形式时必填\n7. 需验真',
                '2': '1. 新增影像件类型：最低立柱测量全景照片\n2. 放置位置：《组件南侧距屋面高度照片【阵列式】》之后\n3. 标记序号：2\n4. 允许上传png、jpg、pdf格式文件\n5. 最大支持上传20MB\n6. 在满足适用房型+二级分类+电站安装形式时必填\n7. 需验真'
            };

            modalBody.textContent = descriptions[featureId] || '暂无描述';
            modal.style.display = "block";
        }

        // Add click event listeners to number labels
        document.querySelectorAll('div[style*="background: red"]').forEach(label => {
            if (label.textContent === '1' || label.textContent === '2') {
                label.addEventListener('click', function() {
                    showPRDDescription(this.textContent);
                });
            }
        });
    </script>
